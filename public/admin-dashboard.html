<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BATTLEZ | ADMIN CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Oxanium:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff6600; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Oxanium'; padding: 30px; }
        h1, h2 { font-family: 'Orbitron'; color: var(--neon); text-transform: uppercase; margin: 0; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #111; padding: 20px; border-radius: 10px; border-bottom: 2px solid var(--neon); }
        .nav-btns { display: flex; gap: 15px; }
        .table-container { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #222; text-align: left; font-size: 0.9rem; }
        th { background: var(--neon); color: black; font-family: 'Orbitron'; }
        
        /* Inputs styling */
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 250px; display: block; font-family: 'Oxanium'; }
        
        .ss-btn { color: #00f2ff; text-decoration: none; font-weight: bold; }
        .action-btns button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .approve { background: #00ff88; color: black; }
        .approve:hover { background: #00cc6e; }
        .reject { background: #ff3333; color: white; margin-left: 5px; }
        .reject:hover { background: #cc2222; }
        
        .home-btn { background: transparent; color: white; border: 1px solid var(--neon); padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; border-radius: 5px; }
        .home-btn:hover { background: var(--neon); color: black; }
        .clear-btn { background: #ff0000; color: white; padding: 10px 20px; font-family: 'Orbitron'; border: none; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        
        .status-pending { color: #ffaa00; font-weight: bold; }
        .status-approved { color: #00ff88; font-weight: bold; }

        /* Maintenance Button Dynamic Colors */
        .mt-off { background: #ff3333; color: white; }
        .mt-on { background: #00ff88; color: black; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>BattleZ Control Panel</h1>
        <div class="nav-btns">
            <button class="home-btn" onclick="window.location.href='/'">⬅ HOME PAGE</button>
            <button class="clear-btn" onclick="clearEverything()">⚠️ RESET TOURNAMENT</button>
        </div>
    </div>

    <div class="table-container" style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="flex: 1;">
            <h3>Match Scheduling</h3>
            <label style="font-size: 0.8rem; color: #888;">Slot 1 Timing:</label>
            <input type="text" id="s1Input" placeholder="e.g. Today 9:00 PM">
            <label style="font-size: 0.8rem; color: #888;">Slot 2 Timing:</label>
            <input type="text" id="s2Input" placeholder="e.g. Tomorrow 10:00 PM">
            <button class="approve" style="padding: 10px 20px; margin-top:5px" onclick="saveSchedule()">SAVE SCHEDULE</button>
        </div>
        
        <div style="flex: 1; border-left: 1px solid #333; padding-left: 20px;">
            <h3>Tournament Tools</h3>
            <button class="home-btn" style="margin-bottom: 10px; width: 100%;" onclick="exportToExcel()">📊 DOWNLOAD EXCEL LIST</button>
            <button id="mtBtn" class="reject mt-off" style="width: 100%; padding: 12px;" onclick="toggleMT()">MAINTENANCE: OFF</button>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        let mtStatus = false;

        // 1. Database se Settings fetch karna (Refresh problem solve karega)
        async function fetchSettings() {
            try {
                const res = await fetch('/get-settings');
                const data = await res.json();
                
                // Inputs fill karna
                document.getElementById('s1Input').value = data.slot1Time || "";
                document.getElementById('s2Input').value = data.slot2Time || "";
                
                // Maintenance status set karna
                mtStatus = data.isMaintenance;
                updateMTButtonUI();
            } catch (err) { console.error("Settings fetch error:", err); }
        }

        function updateMTButtonUI() {
            const btn = document.getElementById('mtBtn');
            if (mtStatus) {
                btn.innerText = "MAINTENANCE: ON";
                btn.className = "reject mt-on";
            } else {
                btn.innerText = "MAINTENANCE: OFF";
                btn.className = "reject mt-off";
            }
        }

        // 2. Load Teams Data
        async function loadData() {
            await fetchSettings(); // Pehle settings load karo

            const res = await fetch('/admin/teams');
            const teams = await res.json();
            
            const s1Body = document.getElementById('slot1Body');
            const s2Body = document.getElementById('slot2Body');
            s1Body.innerHTML = ''; s2Body.innerHTML = '';

            // Note: Agar tumne LIMIT 2 rakha hai test ke liye toh yahan "index < 2" karna
            // Production ke liye 25 hi rehne dena
            const LIMIT = 25; 

            teams.forEach((team, index) => {
                const isSlot1 = index < LIMIT;
                const roomSlot = isSlot1 ? index + 1 : (index - LIMIT) + 1;
                
                const row = `
                    <tr>
                        <td style="font-weight:bold; color:var(--neon)">${roomSlot}</td>
                        <td>${team.teamName}</td>
                        <td>${team.leaderIGN}</td>
                        <td>${team.whatsapp}</td>
                        <td><a href="${team.paymentScreenshot}" target="_blank" class="ss-btn">VIEW SS</a></td>
                        <td class="status-${team.status.toLowerCase()}">${team.status}</td>
                        <td class="action-btns">
                            <button class="approve" onclick="updateStatus('${team._id}', 'Approved')">✔</button>
                            <button class="reject" onclick="updateStatus('${team._id}', 'Rejected')">✖</button>
                        </td>
                    </tr>`;
                
                if (isSlot1) s1Body.innerHTML += row;
                else s2Body.innerHTML += row;
            });
        }

        // --- FUNCTIONS ---

        async function saveSchedule() {
            const s1 = document.getElementById('s1Input').value;
            const s2 = document.getElementById('s2Input').value;
            await fetch('/admin/update-schedule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ slot1: s1, slot2: s2 })
            });
            alert("✅ Schedule Updated in Database!");
        }

        async function toggleMT() {
            mtStatus = !mtStatus;
            await fetch('/admin/toggle-maintenance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: mtStatus })
            });
            updateMTButtonUI();
            alert(`Maintenance is now ${mtStatus ? 'ON' : 'OFF'}`);
        }

        async function updateStatus(id, status) {
            let msg = status === 'Rejected' ? "Delete this team?" : "Approve this team?";
            if(!confirm(msg)) return;

            const res = await fetch('/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, status})
            });
            if(res.ok) loadData();
        }

        async function clearEverything() {
            if(confirm("DANGER! Sabhi teams aur images delete ho jayengi. Sure?")) {
                const res = await fetch('/admin/clear-all-data', { method: 'POST' });
                const result = await res.json();
                alert(result.message);
                loadData();
            }
        }

        async function exportToExcel() {
            const res = await fetch('/admin/teams');
            const teams = await res.json();
            const data = teams.map((t, i) => ({
                "Room Slot": i < 25 ? i + 1 : (i - 25) + 1,
                "Slot": i < 25 ? "Slot 1" : "Slot 2",
                "Team": t.teamName,
                "Leader": t.leaderIGN,
                "WhatsApp": t.whatsapp,
                "Status": t.status
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Teams");
            XLSX.writeFile(wb, "BattleZ_Final_List.xlsx");
        }

        window.onload = loadData;
    </script>

    <div class="table-container">
        <h2>Slot #1 (Room Slots 1-25)</h2>
        <table>
            <thead>
                <tr>
                    <th>Room Slot</th>
                    <th>Team Name</th>
                    <th>Leader IGN</th>
                    <th>WhatsApp</th>
                    <th>Payment</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="slot1Body"></tbody>
        </table>
    </div>

    <div class="table-container">
        <h2>Slot #2 (Room Slots 1-25)</h2>
        <table>
            <thead>
                <tr>
                    <th>Room Slot</th>
                    <th>Team Name</th>
                    <th>Leader IGN</th>
                    <th>WhatsApp</th>
                    <th>Payment</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="slot2Body"></tbody>
        </table>
    </div>
</body>
</html>
